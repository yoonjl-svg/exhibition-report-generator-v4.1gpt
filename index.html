<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>v4.1gpt Exhibition Report Data Review</title>
    <link rel="stylesheet" href="src/styles.css?v=20260513-23" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">IMA Exhibition Workspace v4.3</p>
        <h1 id="report-title">전시보고서 데이터 검토</h1>
      </div>
      <div class="toolbar" aria-label="report tools">
        <input id="excel-upload" class="visually-hidden" type="file" accept=".xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
        <button id="upload-excel-button" type="button">Excel 업로드</button>
        <button id="load-sample-button" type="button">샘플 채우기</button>
        <div class="export-menu">
          <button id="export-menu-button" class="primary-button" type="button" aria-expanded="false" aria-controls="export-menu">보고서 내보내기</button>
          <div id="export-menu" class="export-menu-panel" hidden>
            <button id="download-report-doc" type="button">.docx</button>
            <button id="print-report-pdf" type="button">.pdf</button>
          </div>
        </div>
        <a class="button-link" href="templates/ilmin-report-input-template.xlsx" download>Excel Template</a>
      </div>
    </header>

    <main id="workspace" class="layout" hidden>
      <aside class="sidebar" aria-label="data filters">
        <section class="panel compact">
          <h2>관찰 데이터 필터</h2>
          <p class="panel-note">아래 관찰 데이터 목록만 좁혀 봅니다. 보고서 출력 여부는 보고서 포함과 핵심 지표 설정으로 결정됩니다.</p>
          <p id="filter-summary" class="filter-summary"></p>
          <label>
            섹션
            <select id="section-filter"></select>
          </label>
          <label>
            중요도
            <select id="importance-filter">
              <option value="all">전체</option>
              <option value="high">높음</option>
              <option value="medium">중간</option>
              <option value="low">낮음</option>
            </select>
          </label>
          <label>
            진술 성격
            <select id="kind-filter">
              <option value="all">전체</option>
              <option value="factual">사실</option>
              <option value="comparative">비교</option>
              <option value="interpretive">해석</option>
              <option value="inference">추정</option>
              <option value="data_quality">데이터 검증</option>
            </select>
          </label>
          <button id="clear-filters" class="wide-button" type="button">필터 해제</button>
        </section>

        <section class="panel compact">
          <h2>출력 설정</h2>
          <dl id="review-list" class="health-list"></dl>
          <div class="sidebar-actions">
            <button id="approve-all" type="button">모두 포함</button>
            <button id="reset-review" type="button">초기화</button>
          </div>
        </section>

        <section class="panel compact">
          <h2>데이터 상태</h2>
          <dl id="health-list" class="health-list"></dl>
        </section>
      </aside>

      <section class="content">
        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Director View</p>
              <h2>핵심 지표 요약</h2>
            </div>
            <p id="scope-note" class="note"></p>
          </div>
          <div id="metric-strip" class="metric-strip"></div>
          <div id="brief-observations" class="observation-list"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Data</p>
              <h2>관찰 데이터</h2>
            </div>
            <div class="section-actions">
              <p id="observation-count" class="note"></p>
              <div class="local-actions" aria-label="data tools">
                <button id="toggle-evidence" type="button" aria-pressed="true">근거</button>
              </div>
            </div>
          </div>
          <div id="ledger-list" class="observation-list"></div>
        </section>
      </section>

      <aside class="report-column" aria-label="report preview">
        <section class="panel report-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Rendered Report</p>
              <h2>보고서 초안</h2>
            </div>
            <p id="report-draft-note" class="note"></p>
          </div>
          <div id="report-draft" class="report-draft report-preview"></div>
        </section>
      </aside>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="data/generated-ledger.js?v=20260513-23"></script>
    <script src="data/generated-report.js?v=20260513-23"></script>
    <script src="data/sample-ledger.js?v=20260513-23"></script>
    <script src="src/ledger.js?v=20260513-23"></script>
    <script src="src/docx-export.js?v=20260513-23"></script>
    <script src="src/input-loader.js?v=20260513-23"></script>
    <script src="src/charts.js?v=20260513-23"></script>
    <script src="src/app.js?v=20260513-23"></script>
  </body>
</html>
