<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>v4.1gpt Exhibition Report Data Review</title>
    <link rel="stylesheet" href="src/styles.css?v=20260513-3" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Ilmin Exhibition Report v4.1gpt</p>
        <h1 id="report-title">전시보고서 데이터 검토</h1>
      </div>
      <div class="toolbar" aria-label="report tools">
        <button id="copy-markdown" type="button">Copy Report</button>
        <button id="download-report-html" type="button">HTML</button>
        <button id="download-report-doc" type="button">DOCX</button>
        <button id="download-approved-ledger" type="button">검토 데이터</button>
        <a class="button-link" href="output/report-draft.docx" download>Sample DOCX</a>
        <a class="button-link" href="templates/ilmin-report-input-template.zip" download>CSV Template</a>
        <button id="toggle-evidence" type="button" aria-pressed="true">Evidence</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="data filters">
        <section class="panel compact">
          <h2>관찰 데이터 필터</h2>
          <p class="panel-note">아래 관찰 데이터 목록만 좁혀 봅니다. 보고서 출력 여부는 보고서 포함과 요약 포함 설정으로 결정됩니다.</p>
          <p id="filter-summary" class="filter-summary"></p>
          <label>
            섹션
            <select id="section-filter"></select>
          </label>
          <label>
            중요도
            <select id="importance-filter">
              <option value="all">전체</option>
              <option value="high">높음</option>
              <option value="medium">중간</option>
              <option value="low">낮음</option>
            </select>
          </label>
          <label>
            진술 성격
            <select id="kind-filter">
              <option value="all">전체</option>
              <option value="factual">사실</option>
              <option value="comparative">비교</option>
              <option value="interpretive">해석</option>
              <option value="inference">추정</option>
              <option value="data_quality">데이터 검증</option>
            </select>
          </label>
          <button id="clear-filters" class="wide-button" type="button">필터 해제</button>
        </section>

        <section class="panel compact">
          <h2>출력 설정</h2>
          <dl id="review-list" class="health-list"></dl>
          <div class="sidebar-actions">
            <button id="approve-all" type="button">모두 포함</button>
            <button id="reset-review" type="button">초기화</button>
          </div>
        </section>

        <section class="panel compact">
          <h2>데이터 상태</h2>
          <dl id="health-list" class="health-list"></dl>
        </section>
      </aside>

      <section class="content">
        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Director View</p>
              <h2>핵심 관찰 요약</h2>
            </div>
            <p id="scope-note" class="note"></p>
          </div>
          <div id="metric-strip" class="metric-strip"></div>
          <div id="brief-observations" class="observation-list"></div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Rendered Report</p>
              <h2>보고서 초안</h2>
            </div>
            <p id="report-draft-note" class="note"></p>
          </div>
          <pre id="report-draft" class="report-draft"></pre>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Data</p>
              <h2>관찰 데이터</h2>
            </div>
            <p id="observation-count" class="note"></p>
          </div>
          <div id="ledger-list" class="observation-list"></div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="data/generated-ledger.js?v=20260513-3"></script>
    <script src="data/generated-report.js?v=20260513-3"></script>
    <script src="data/sample-ledger.js?v=20260513-3"></script>
    <script src="src/ledger.js?v=20260513-3"></script>
    <script src="src/docx-export.js?v=20260513-3"></script>
    <script src="src/app.js?v=20260513-3"></script>
  </body>
</html>
